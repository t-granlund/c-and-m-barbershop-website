<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="100%" height="100%" role="img" aria-label="C &amp; M Barber Shop logo">
  <!--
       C &amp; M Barber Shop brand mark.
       Draw order (bottom to top):
         1. Left pole
         2. Right pole
         3. Red oval (AAA-compliant red)
         4. C &amp; M black circle
         5. BARBER SHOP wordmark
         6. Mustache — drawn LAST so it sits ON TOP, clearly visible

       v2 fix: Mustache rebuilt as two separate half-paths (left + right)
       to avoid self-intersecting spiral tips that caused rendering holes
       under the default nonzero fill-rule.
    -->

  <!-- 1. Left barber pole -->
  <g transform="translate(40, 50)">
    <path d="M 18 0 C 8 0, 0 8, 0 18 L 36 18 C 36 8, 28 0, 18 0 Z" fill="#231F20"/>
    <rect x="2" y="18" width="32" height="174" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
    <polygon points="2,28  34,58  34,70 2,40"    fill="#1B365D"/>
    <polygon points="2,58  34,88  34,100 2,70"   fill="#B40823"/>
    <polygon points="2,88  34,118 34,130 2,100"  fill="#1B365D"/>
    <polygon points="2,118 34,148 34,160 2,130"  fill="#B40823"/>
    <polygon points="2,148 34,178 34,190 2,160"  fill="#1B365D"/>
    <polygon points="2,178 34,190 34,192 2,188"  fill="#B40823"/>
    <path d="M 0 192 L 36 192 C 36 202, 28 210, 18 210 C 8 210, 0 202, 0 192 Z" fill="#231F20"/>
  </g>

  <!-- 2. Right barber pole (mirror) -->
  <g transform="translate(324, 50)">
    <path d="M 18 0 C 8 0, 0 8, 0 18 L 36 18 C 36 8, 28 0, 18 0 Z" fill="#231F20"/>
    <rect x="2" y="18" width="32" height="174" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
    <polygon points="2,28  34,58  34,70 2,40"    fill="#1B365D"/>
    <polygon points="2,58  34,88  34,100 2,70"   fill="#B40823"/>
    <polygon points="2,88  34,118 34,130 2,100"  fill="#1B365D"/>
    <polygon points="2,118 34,148 34,160 2,130"  fill="#B40823"/>
    <polygon points="2,148 34,178 34,190 2,160"  fill="#1B365D"/>
    <polygon points="2,178 34,190 34,192 2,188"  fill="#B40823"/>
    <path d="M 0 192 L 36 192 C 36 202, 28 210, 18 210 C 8 210, 0 202, 0 192 Z" fill="#231F20"/>
  </g>

  <!-- 3. Red oval (AAA-compliant) -->
  <ellipse cx="200" cy="150" rx="140" ry="85" fill="#B40823"/>

  <!-- 4. C &amp; M black circle (spaced) -->
  <circle cx="200" cy="65" r="35" fill="#231F20"/>
  <text x="200" y="75" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="22" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="0.02em">C &amp; M</text>

  <!-- 5. BARBER SHOP wordmark -->
  <text x="200" y="145" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">BARBER</text>
  <text x="200" y="195" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle">SHOP</text>

  <!-- 6. Mustache — v4: tightened to stay inside the red oval.
       Each half is a simple closed path (no self-intersection, no spirals).
       Tips now peak at x=85/315 so they sit well inside the oval's
       inner cap radius and don't cover the barber poles at x=40-76 / 324-360.
       Paths meet at (200, 212) at the philtrum line. -->
  <g fill="#231F20">
    <!-- Left half: center → belly down-left → tip curls UP → top back to center -->
    <path d="M 200 212
             C 200 222, 190 229, 170 231
             C 140 234, 110 231, 92 223
             C 78 216, 74 204, 86 198
             C 98 195, 108 203, 112 214
             C 118 222, 148 221, 180 216
             C 192 213, 198 212, 200 212 Z"/>
    <!-- Right half: mirror — center → belly down-right → tip curls UP → top back -->
    <path d="M 200 212
             C 200 222, 210 229, 230 231
             C 260 234, 290 231, 308 223
             C 322 216, 326 204, 314 198
             C 302 195, 292 203, 288 214
             C 282 222, 252 221, 220 216
             C 208 213, 202 212, 200 212 Z"/>
  </g>
</svg>
